<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pet AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="pet-app">
        <h1>Smart Pet AI</h1>
        <h2>Seu Pet</h2>
        <section class="pet-visual">
            👽
        </section>
        <section class="status-pet">
            <div class="status-linha">
               <p>Fome:</p> 
                <progress id="fome-barra" max="100" value="100"></progress>
                <span id="fome-valor">100</span>
            </div>
            <div class="status-linha">
                <p>Energia:</p>
                <progress id="energia-barra" max="100" value="100"></progress>
                <span id="energia-valor">100</span>
            </div>
            <div class="status-linha">
                <p>Humor:</p>
                <progress id="humor-barra" max="100" value="100"></progress>
                <span id="humor-valor">100</span>
            </div>
            <div class="status-linha">
                <p>XP:</p>
                <span id="xp-valor">0</span>
            </div>
            <div class="status-linha">
                <p>Level:</p>
                <span id="level-valor">1</span>
            </div>
        </section>
        <section class="botoes-acoes">  
            <button type="button" id="btn-alimentar">
                Alimentar
            </button>
            <button type="button" id="btn-dormir">
                Dormir
            </button>
            <button type="button" id="btn-brincar">
                Brincar
            </button>
        </section>
        <section class="pomodoro-acoes">
            <div>
                <p>POMODORO:</p>
            </div>
            <div class="status-linha">
                <span id="pomodoro-tempo">25:00</span>
                <p>Total-min:</p>
                <span id="pomodoro-level">0</span>
                
            </div>
            <button type="button" id="btn-iniciar">
                <p>Iniciar</p>
            </button>
            <button type="button" id="btn-reiniciar">
                <p>Reiniciar</p>
            </button>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
